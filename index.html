<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Messenger</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>إرسال رسالة إلى ESP32</h1>

    <p>
      اكتب رسالة ثم اضغط إرسال
    </p>

    <input
      type="text"
      id="messageInput"
      placeholder="اكتب الرسالة هنا">

    <button onclick="saveMessage()">
      إرسال
    </button>

    <div id="status"></div>

    <hr>

    <h3>آخر رسالة في Firebase</h3>

    <div id="currentMessage">
      Waiting...
    </div>

  </div>

  <script type="module" src="script.js"></script>

</body>

</html>
